<!doctype html>
<html>
  <head>
    <title>Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        text-align: center;
      }

      h2 {
        margin-bottom: 20px;
        color: white;
      }

      form {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #5a67d8;
      }

      p {
        margin-top: 15px;
        color: white;
      }

      a {
        color: #ffd369;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Login</h2>

      <form id="loginForm">
        <input
          type="email"
          id="email"
          placeholder="Enter Email"
          required
        /><br /><br />
        <input
          type="password"
          id="password"
          placeholder="Enter Password"
          required
        /><br /><br />
        <button type="submit">Login</button>
      </form>

      <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>

    <script src="/js/main.js"></script>
  </body>
</html>
