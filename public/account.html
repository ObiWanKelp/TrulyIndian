<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Account - Truly Indian</title>

    <link rel="stylesheet" href="/css/style-home.css" />

    <style>
      .account-box {
        max-width: 700px;
        margin: 50px auto;
        background: white;
        padding: 40px;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      .account-box h2 {
        font-size: 32px;
        color: #b19cd9;
        margin-bottom: 25px;
      }

      .account-box p {
        font-size: 17px;
        margin-bottom: 20px;
        color: #444;
      }

      .account-box input {
        width: 100%;
        padding: 14px;
        margin-bottom: 18px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
      }

      .account-box button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 14px;
        transition: 0.3s;
      }

      .update-btn {
        background: #b19cd9;
        color: white;
      }

      .update-btn:hover {
        background: #9b84c9;
      }

      .post-list {
        margin-top: 35px;
        text-align: left;
      }

      .post-list h2 {
        font-size: 28px;
        color: #b19cd9;
        margin-bottom: 20px;
        text-align: center;
      }

      .post-card {
        background: #f8f8f8;
        padding: 18px;
        border-radius: 14px;
        margin-bottom: 16px;
        border: 1px solid #ececec;
      }

      .post-card h3 {
        margin-bottom: 8px;
        color: #333;
      }

      .post-card p {
        margin-bottom: 10px;
        font-size: 15px;
      }

      .post-card button {
        width: auto;
        padding: 10px 16px;
        margin-top: 8px;
        margin-bottom: 0;
        background: #444;
        color: white;
      }

      .post-card button:hover {
        background: #222;
      }

      @media (max-width: 768px) {
        .account-box {
          margin: 20px;
          padding: 25px;
        }

        .account-box h2 {
          font-size: 28px;
        }

        .post-list h2 {
          font-size: 24px;
        }
      }
    </style>
  </head>

  <body>
    <script src="/js/auth.js"></script>

    <header>
      <h1>Truly Indian</h1>

      <nav>
        <a href="index.html">Home</a>
        <a href="submit.html">Submit</a>
        <a href="about.html">About</a>

        <div class="nav-right">
          <div class="dropdown">
            <button class="dropbtn">☰</button>

            <div class="dropdown-content">
              <button onclick="logout()">Logout</button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="account-box">
        <h2>My Account</h2>

        <p><strong>Email:</strong> <span id="email"></span></p>

        <input type="text" id="name" placeholder="Update Name" />
        <input type="password" id="password" placeholder="New Password" />

        <button class="update-btn" onclick="updateUser()">
          Update Profile
        </button>

        <div class="post-list">
          <h2>My Posts</h2>
          <p
            style="
              text-align: center;
              margin-bottom: 18px;
              font-size: 15px;
              color: #666;
            "
          >
            View your approved and pending places / subplaces.
          </p>
          <div id="myPosts"></div>
        </div>
      </section>
    </main>

    <footer>
      <section class="Rights">
        <p>&copy; 2025 Truly Indian by HorizonWorks. All rights reserved.</p>
        <p>
          <a href="#">Privacy Policy</a> |
          <a href="#">Terms & Conditions</a>
        </p>
      </section>
    </footer>

    <script src="/js/account.js"></script>
  </body>
</html>
