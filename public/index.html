<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truly Indian</title>

    <link rel="stylesheet" href="/css/style-home.css" />

    <style>
      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .hero h1 {
        font-size: 42px;
        color: #b19cd9;
        margin-bottom: 10px;
      }

      .hero h2 {
        font-size: 18px;
        color: #555;
        font-weight: 400;
      }

      .destinations {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 320px));
        gap: 30px;
        justify-content: center;
        padding: 20px;
      }

      .destinations article {
        background: white;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        transition: 0.3s ease;
        cursor: pointer;
      }

      .destinations article:hover {
        transform: translateY(-8px);
        box-shadow: 0 18px 35px rgba(0, 0, 0, 0.12);
      }

      .destinations article a {
        text-decoration: none;
        color: inherit;
        display: block;
      }

      .destinations article img {
        width: 100%;
        height: 230px;
        object-fit: cover;
        display: block;
        transition: 0.4s ease;
      }

      .destinations article:hover img {
        transform: scale(1.06);
      }

      .destinations p {
        padding: 18px;
        font-size: 20px;
        font-weight: 600;
        text-align: center;
        color: #333;
      }

      @media (max-width: 768px) {
        .hero h1 {
          font-size: 32px;
        }

        .hero h2 {
          font-size: 16px;
        }

        .destinations {
          gap: 20px;
          padding: 10px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <script src="/js/auth.js"></script>

      <h1>Truly Indian</h1>

      <nav>
        <a href="submit.html">Submit</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>

        <div class="nav-right">
          <div class="dropdown">
            <button class="dropbtn">☰</button>

            <div class="dropdown-content">
              <a href="account.html">Account</a>
              <button onclick="logout()">Logout</button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Where to next?</h1>
        <h2>Look at a few of the most famous places with Truly Indian</h2>
      </section>

      <section class="destinations" id="placesContainer"></section>

      <script src="/js/home.js"></script>
    </main>

    <footer>
      <section class="Rights">
        <p>&copy; 2025 Truly Indian by HorizonWorks. All rights reserved.</p>

        <p>
          <a href="privacy.html" target="_blank">Privacy Policy</a> |
          <a href="terms.html" target="_blank">Terms & Conditions</a>
        </p>
      </section>
    </footer>
  </body>
</html>
