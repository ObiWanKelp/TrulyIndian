<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Truly Indian</title>

    <link rel="stylesheet" href="/css/style-home.css" />

    <style>
      .admin-container {
        max-width: 1200px;
        margin: 50px auto;
        padding: 20px;
      }

      .admin-section {
        margin-bottom: 60px;
      }

      .admin-section h2 {
        font-size: 32px;
        color: #b19cd9;
        margin-bottom: 30px;
        text-align: center;
      }

      .form-box {
        max-width: 700px;
        margin: 50px auto;
        background: white;
        padding: 40px;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        text-align: center;
        display: flex;
        flex-direction: column;
      }

      .form-box input,
      .form-box textarea {
        width: 100%;
        padding: 14px;
        margin-bottom: 18px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
        font-family: inherit;
      }

      .form-box textarea {
        height: 170px;
        resize: vertical;
      }

      .form-box button {
        background: #b19cd9;
        color: white;
        border: none;
        padding: 14px 34px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        width: 180px;
        margin: 10px auto 0;
      }

      .form-box button:hover {
        background: #9d87cc;
        transform: translateY(-2px);
      }

      .admin-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 320px));
        gap: 30px;
        justify-content: center;
        padding: 10px;
      }

      .admin-card {
        background: white;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        transition: 0.3s ease;
      }

      .admin-card:hover {
        transform: translateY(-8px);
      }

      .admin-card img {
        width: 100%;
        height: 230px;
        object-fit: cover;
      }

      .admin-card-content {
        padding: 18px;
        text-align: center;
      }

      .admin-card-content h3 {
        font-size: 22px;
        margin-bottom: 10px;
      }

      .admin-card-content p {
        font-size: 15px;
        color: #555;
        margin-bottom: 12px;
      }

      .subplace-box {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #eee;
      }

      .subplace-box p {
        margin-bottom: 10px;
      }

      .admin-actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      .admin-actions button,
      .subplace-box button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-weight: 600;
      }

      .approve {
        background: #28a745;
      }

      .reject {
        background: #ff4d4d;
      }

      .delete {
        background: #444;
      }

      @media (max-width: 768px) {
        .admin-container {
          margin: 20px auto;
          padding: 10px;
        }

        .admin-section h2 {
          font-size: 26px;
        }

        .form-box {
          margin: 20px auto;
          padding: 25px;
        }

        .admin-grid {
          gap: 20px;
        }
      }
    </style>
  </head>

  <body>
    <script src="/js/auth.js"></script>

    <script>
      const user = JSON.parse(localStorage.getItem("user"));

      if (!user || user.role !== "admin") {
        alert("Access denied ❌");
        window.location.href = "/login.html";
      }
    </script>

    <header>
      <h1>Truly Indian</h1>

      <nav>
        <a href="index.html">Home</a>
        <a href="submit.html">Submit</a>
        <a href="account.html">Account</a>

        <div class="nav-right">
          <div class="dropdown">
            <button class="dropbtn">☰</button>

            <div class="dropdown-content">
              <button onclick="logout()">Logout</button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="admin-container">
      <section class="admin-section">
        <h2>Add New Place</h2>

        <form id="placeForm" class="form-box">
          <input type="text" id="name" placeholder="Place Name" required />
          <input type="text" id="slug" placeholder="Slug (delhi)" required />
          <input type="text" id="image" placeholder="Image URL" required />
          <textarea id="description" placeholder="Description"></textarea>
          <button type="submit">Add Place</button>
        </form>

        <h2>Add Subplace</h2>

        <form id="subplaceForm" class="form-box">
          <input
            type="text"
            id="parentSlug"
            placeholder="Parent Place Slug (delhi)"
            required
          />

          <input
            type="text"
            id="subName"
            placeholder="Subplace Name"
            required
          />

          <input type="text" id="subImage" placeholder="Image URL" required />

          <textarea id="subDescription" placeholder="Description"></textarea>

          <button type="submit">Add Subplace</button>
        </form>
      </section>

      <section class="admin-section">
        <h2>Pending Submissions</h2>
        <div id="pendingList" class="admin-grid"></div>
      </section>

      <section class="admin-section">
        <h2>Approved Places & Subplaces</h2>
        <div id="approvedList" class="admin-grid"></div>
      </section>
    </main>

    <footer>
      <section class="Rights">
        <p>&copy; 2025 Truly Indian by HorizonWorks. All rights reserved.</p>
        <p>
          <a href="#">Privacy Policy</a> |
          <a href="#">Terms & Conditions</a>
        </p>
      </section>
    </footer>

    <script src="/js/admin.js"></script>
  </body>
</html>
